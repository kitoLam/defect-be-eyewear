name: CI/CD - Defect Management

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Fetch last 2 commits to compare changes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Secret Scanner
        run: node .github/scripts/secret-scanner.js changed

      - name: Upload scan results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-results
          path: .github/scripts/secret-scanner.js
          retention-days: 7

  unit-tests:
    name: Unit Tests (Playwright)
    runs-on: ubuntu-latest
    needs: secret-scan  # Run only if secret scan passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed - dist directory not found"
            exit 1
          fi
          echo "Build successful - dist directory created"

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [secret-scan, unit-tests, build-check]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.secret-scan.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "❌ Quality gate failed - one or more checks failed"
            exit 1
          fi
          echo "✅ Quality gate passed - all checks successful"

      - name: Post status
        if: always()
        run: |
          echo "================================================"
          echo "Quality Gate Results:"
          echo "- Secret Scan: ${{ needs.secret-scan.result }}"
          echo "- Unit Tests: ${{ needs.unit-tests.result }}"
          echo "- Build Check: ${{ needs.build-check.result }}"
          echo "================================================"
