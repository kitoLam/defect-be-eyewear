name: Tests on Push to Main

# Workflow này chạy KHI PUSH TRỰC TIẾP vào master hoặc main
# Giúp phát hiện lỗi ngay cả khi code được push trực tiếp (không qua PR)
on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

jobs:
  api-tests:
    name: API Tests on Push
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run API Tests
        run: npm test
        env:
          API_BASE_URL: http://localhost:5000
          CI: true

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
            test-results.json
            test-results.xml
          retention-days: 30

      - name: Test Summary
        if: always()
        run: |
          if [ -f test-results.json ]; then
            echo "## 📊 Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "View detailed report in Artifacts above ⬆️" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Tests failed on push to ${{ github.ref_name }}. Check the test report in Artifacts."
          echo "🔍 To reproduce locally: npm test"
