services:
    backend:
        build: .
        container_name: eyewear-backend
        ports:
            - '5000:5000'
        environment:
            - NODE_ENV=deployment
        env_file:
            - .env
        restart: always
        mem_limit: 1.5G
        memswap_limit: 1.5G
        deploy:
            resources:
                limits:
                    memory: 1.5G
        networks:
            - eyewear-network

networks:
    eyewear-network:
        driver: bridge
